<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レビューサイト</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ヘッダー -->
  <header>
    <h1>作品レビューサイト</h1>
    <nav>
      <ul>
        <li><a href="#">映画</a></li>
        <li><a href="#">小説</a></li>
        <li><a href="#">ランキング</a></li>
        <li><a href="#">投稿する</a></li>
      </ul>
    </nav>
  </header>

  <!-- メイン -->
  <main>

    <!-- 検索 -->
    <section class="search">
      <input type="text" placeholder="作品を検索">
      <button>検索</button>
    </section>

    <!-- 人気レビュー -->
    <section>
      <h2>人気レビュー</h2>

      <article class="review-card">
        <h3>作品タイトル</h3>
        <p>ジャンル：映画 / 小説</p>
        <p>評価：★★★★☆</p>
        <p>一言レビュー：ここに短い感想が入る</p>
        <a href="#">続きを読む</a>
      </article>

      <article class="review-card">
        <h3>作品タイトル</h3>
        <p>ジャンル：映画 / 小説</p>
        <p>評価：★★★☆☆</p>
        <p>一言レビュー：ここに短い感想が入る</p>
        <a href="#">続きを読む</a>
      </article>

    </section>

    <!-- 新着 -->
    <section>
      <h2>新着レビュー</h2>
      <ul>
        <li>作品A - ★★★★☆</li>
        <li>作品B - ★★★☆☆</li>
        <li>作品C - ★★★★★</li>
      </ul>
    </section>

  </main>

  <!-- フッター -->
  <footer>
    <p>© レビューサイト</p>
  </footer>

</body>
</html>
